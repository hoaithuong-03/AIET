<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Story Agent | Midnight Indigo</title>
    <!-- Scripts CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f1a;
            color: #e2e8f0;
            overflow: hidden;
        }

        .glass-sidebar {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .user-bubble {
            background: linear-gradient(135deg, #4338ca 0%, #6366f1 100%);
            box-shadow: 0 4px 15px rgba(67, 56, 202, 0.3);
        }

        .ai-bubble {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-light {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .animate-pulse-light {
            animation: pulse-light 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Textarea resize animation */
        .input-area {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        midnight: {
                            base: '#0b0f1a',
                            panel: '#0f172a',
                            card: '#1e293b',
                            accent: '#4338ca',
                            hover: '#312e81'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Components ---

        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const SidebarItem = ({ icon, label, active, onClick }) => (
            <div
                onClick={onClick}
                className={`flex items-center space-x-3 px-4 py-3 rounded-xl cursor-pointer transition-all duration-200 ${active
                    ? 'bg-midnight-accent text-white shadow-lg shadow-indigo-900/40'
                    : 'text-slate-400 hover:bg-white/5 hover:text-slate-200'
                    }`}
            >
                <Icon name={icon} className="w-5 h-5" />
                <span className="font-medium text-sm">{label}</span>
            </div>
        );

        const MessageBubble = ({ message }) => {
            const isUser = message.role === 'user';

            return (
                <motion.div
                    initial={{ opacity: 0, y: 10, scale: 0.95 }}
                    animate={{ opacity: 1, y: 0, scale: 1 }}
                    className={`flex ${isUser ? 'justify-end' : 'justify-start'} mb-6`}
                >
                    {!isUser && (
                        <div className="w-8 h-8 rounded-full bg-midnight-accent flex items-center justify-center mr-3 mt-1 flex-shrink-0">
                            <Icon name="sparkles" className="w-4 h-4 text-white" />
                        </div>
                    )}
                    <div className={`max-w-[80%] px-5 py-3 rounded-2xl text-sm leading-relaxed ${isUser ? 'user-bubble text-white' : 'ai-bubble text-slate-200'
                        }`}>
                        {message.content}
                    </div>
                </motion.div>
            );
        };

        const LoadingDots = () => (
            <div className="flex space-x-1.5 px-2 py-4">
                <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style={{ animationDelay: '0s' }}></div>
                <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style={{ animationDelay: '0.2s' }}></div>
                <div className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style={{ animationDelay: '0.4s' }}></div>
            </div>
        );

        // --- Main App ---

        function App() {
            const [messages, setMessages] = useState([
                { role: 'assistant', content: 'Xin chào! Tôi là AI Story Agent của bạn. Tôi có thể giúp gì cho bạn hôm nay?' }
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [crawlUrl, setCrawlUrl] = useState('');
            const [showCrawlModal, setShowCrawlModal] = useState(false);
            const [systemStatus, setSystemStatus] = useState('online'); // online, busy

            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages, isLoading]);

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;

                const userMsg = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setIsLoading(true);

                try {
                    const response = await fetch('/ai/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: userMsg })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'assistant', content: data.answer }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'assistant', content: 'Hệ thống gặp lỗi kết nối. Vui lòng thử lại sau.' }]);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleCrawl = async () => {
                if (!crawlUrl.trim() || isLoading) return;

                setShowCrawlModal(false);
                setMessages(prev => [...prev, { role: 'user', content: `Tải nội dung từ: ${crawlUrl}` }]);
                setIsLoading(true);

                try {
                    const response = await fetch('/crawl/full', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: crawlUrl, limit: 10 })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'assistant', content: data.message || data.error || 'Đã hoàn thành yêu cầu crawl.' }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'assistant', content: 'Lỗi khi crawl truyện.' }]);
                } finally {
                    setIsLoading(false);
                }
                setCrawlUrl('');
            };

            return (
                <div className="flex h-screen w-full">
                    {/* Sidebar */}
                    <div className="w-72 glass-sidebar h-full flex flex-col p-6 hidden lg:flex">
                        <div className="flex items-center space-x-3 mb-10 px-2">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/30">
                                <Icon name="zap" className="w-6 h-6 text-white" />
                            </div>
                            <span className="font-bold text-lg tracking-tight text-white flex items-center">
                                Story Agent
                                <span className="text-[10px] ml-2 px-1.5 py-0.5 bg-indigo-500/20 text-indigo-400 rounded-md border border-indigo-500/30">PRO</span>
                                <span className="text-[10px] ml-1 px-1.5 py-0.5 bg-emerald-500/20 text-emerald-400 rounded-md border border-emerald-500/30">NEW</span>
                            </span>
                        </div>

                        <button
                            onClick={() => setMessages([{ role: 'assistant', content: 'Cuộc trò chuyện mới đã bắt đầu!' }])}
                            className="flex items-center justify-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl transition-all duration-200 mb-8 shadow-lg shadow-indigo-600/20"
                        >
                            <Icon name="plus" className="w-4 h-4" />
                            <span className="text-sm font-semibold">New Chat</span>
                        </button>

                        <div className="flex-1 space-y-2 overflow-y-auto pr-2 custom-scrollbar">
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-4 mb-3">Today</p>
                            <SidebarItem icon="message-square" label="Truyện Tiên Nghịch" active={true} />
                            <SidebarItem icon="message-square" label="Phàm Nhân Tu Tiên" />
                            <SidebarItem icon="message-square" label="Thế Giới Hoàn Mỹ" />
                        </div>

                        <div className="pt-6 border-t border-white/5 space-y-2">
                            <SidebarItem icon="database" label="Crawl Story" onClick={() => setShowCrawlModal(true)} />
                            <SidebarItem icon="settings" label="Settings" />

                            <div className="mt-6 flex items-center space-x-3 px-4 py-3 bg-white/5 rounded-2xl border border-white/5">
                                <img src="https://ui-avatars.com/api/?name=User&background=4338ca&color=fff" className="w-8 h-8 rounded-full" />
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs font-semibold text-white truncate">Administrator</p>
                                    <p className="text-[10px] text-slate-500 truncate">admin@aiet.id</p>
                                </div>
                                <Icon name="log-out" className="w-4 h-4 text-slate-500 cursor-pointer hover:text-red-400" />
                            </div>
                        </div>
                    </div>

                    {/* Main Chat Area */}
                    <div className="flex-1 flex flex-col bg-midnight-base relative h-full">
                        {/* Header */}
                        <header className="h-20 flex items-center justify-between px-8 border-b border-white/5 backdrop-blur-md bg-midnight-base/50 sticky top-0 z-10">
                            <div className="flex items-center space-x-3">
                                <h2 className="font-semibold text-slate-100 uppercase tracking-wide text-xs">Phòng chat hiện tại: <span className="text-indigo-400 ml-1">Tiên Nghịch</span></h2>
                                <div className="flex items-center space-x-1.5 bg-emerald-500/10 px-2 py-0.5 rounded-full border border-emerald-500/20">
                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <span className="text-[10px] font-bold text-emerald-500 uppercase">Live</span>
                                </div>
                            </div>

                            <div className="flex items-center space-x-4">
                                <div className="flex items-center space-x-2 bg-white/5 px-3 py-1.5 rounded-lg border border-white/5">
                                    <Icon name="cpu" className="w-4 h-4 text-slate-400" />
                                    <span className="text-[10px] text-slate-400 font-medium">Gemini 2.5 Flash Lite</span>
                                </div>
                                <button className="p-2 hover:bg-white/5 rounded-lg transition-colors border border-transparent hover:border-white/10">
                                    <Icon name="sun" className="w-5 h-5 text-slate-400" />
                                </button>
                            </div>
                        </header>

                        {/* Chat Context */}
                        <div className="flex-1 overflow-y-auto chat-container p-6 lg:p-12">
                            <div className="max-w-3xl mx-auto">
                                <AnimatePresence>
                                    {messages.map((msg, idx) => (
                                        <MessageBubble key={idx} message={msg} />
                                    ))}
                                    {isLoading && (
                                        <div className="flex justify-start mb-6">
                                            <div className="w-8 h-8 rounded-full bg-indigo-600/20 flex items-center justify-center mr-3 mt-1 flex-shrink-0">
                                                <Icon name="sparkles" className="w-4 h-4 text-indigo-400" />
                                            </div>
                                            <div className="ai-bubble px-5 py-0 rounded-2xl">
                                                <LoadingDots />
                                            </div>
                                        </div>
                                    )}
                                </AnimatePresence>
                                <div ref={messagesEndRef} />
                            </div>
                        </div>

                        {/* Input Area */}
                        <div className="px-6 pb-10 pt-4 bg-gradient-to-t from-midnight-base via-midnight-base to-transparent sticky bottom-0">
                            <div className="max-w-3xl mx-auto relative group">
                                <div className="absolute -inset-0.5 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl opacity-20 blur group-focus-within:opacity-40 transition-all duration-300"></div>
                                <div className="relative glass-card rounded-2xl p-2 flex items-end">
                                    <button className="p-3 hover:bg-white/5 rounded-xl text-slate-400 hover:text-indigo-400 transition-colors">
                                        <Icon name="paperclip" className="w-5 h-5" />
                                    </button>
                                    <textarea
                                        rows="1"
                                        placeholder="Hỏi tôi bất cứ điều gì..."
                                        className="flex-1 bg-transparent border-none focus:ring-0 text-slate-200 placeholder-slate-500 py-3 px-4 resize-none max-h-32 text-sm"
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                e.preventDefault();
                                                handleSend();
                                            }
                                        }}
                                    ></textarea>
                                    <button
                                        onClick={handleSend}
                                        disabled={!input.trim() || isLoading}
                                        className={`p-3 rounded-xl transition-all duration-300 ${input.trim() && !isLoading
                                            ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30 scale-100 hover:scale-105 active:scale-95'
                                            : 'bg-white/5 text-slate-600 cursor-not-allowed'
                                            }`}
                                    >
                                        <Icon name="send" className="w-5 h-5" />
                                    </button>
                                </div>
                                <p className="text-[10px] text-center text-slate-600 mt-4 font-medium tracking-wide">AI Agent có thể mắc lỗi. Vui lòng kiểm tra lại các thông tin quan trọng.</p>
                            </div>
                        </div>

                        {/* Crawl Modal */}
                        <AnimatePresence>
                            {showCrawlModal && (
                                <motion.div
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    exit={{ opacity: 0 }}
                                    className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm"
                                >
                                    <motion.div
                                        initial={{ scale: 0.9, opacity: 0, y: 20 }}
                                        animate={{ scale: 1, opacity: 1, y: 0 }}
                                        exit={{ scale: 0.9, opacity: 0, y: 20 }}
                                        className="w-full max-w-md glass-card rounded-3xl p-8 shadow-2xl relative overflow-hidden"
                                    >
                                        <div className="absolute top-0 right-0 p-6">
                                            <button onClick={() => setShowCrawlModal(false)} className="text-slate-500 hover:text-white transition-colors">
                                                <Icon name="x" className="w-5 h-5" />
                                            </button>
                                        </div>
                                        <div className="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center mb-6">
                                            <Icon name="link" className="w-8 h-8 text-indigo-400" />
                                        </div>
                                        <h3 className="text-xl font-bold text-white mb-2">Tải truyện mới</h3>
                                        <p className="text-sm text-slate-400 mb-8">Dán link từ TruyenFull để AI nạp kiến thức mới.</p>

                                        <div className="space-y-4">
                                            <div>
                                                <label className="text-[10px] font-bold text-slate-500 uppercase mb-2 block tracking-widest">Story URL</label>
                                                <input
                                                    type="text"
                                                    placeholder="https://truyenfull.vn/..."
                                                    className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-200 outline-none transition-all"
                                                    value={crawlUrl}
                                                    onChange={(e) => setCrawlUrl(e.target.value)}
                                                />
                                            </div>
                                            <button
                                                onClick={handleCrawl}
                                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-600/30"
                                            >
                                                Start Crawling
                                            </button>
                                        </div>
                                    </motion.div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
